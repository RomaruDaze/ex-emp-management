<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>従業員管理システム</title>
  <link rel="stylesheet" href="../../static/css/bootstrap.css" th:href="@{/css/bootstrap.css}" />
  <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/css/style.css}" />
  <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>
  <div class="container">
    <!-- 上余白 -->
    <div class="row">
      <div class="col-lg-offset-0 col-lg-6 col-md-8 col-sm-10 col-xs-12">
        <img src="../../static/img/header_logo.png" th:src="@{/img/header_logo.png}" />
      </div>
    </div>
    <!-- login form -->
    <div class="row">
      <div class="col-lg-offset-3 col-lg-6 col-md-offset-2 col-md-8 col-sm-10 col-xs-12">
        <!-- 背景をグレーに、埋め込んだようなコンポーネント -->
        <div class="well">
          <!-- ここから上を編集する必要はありません -->

          <h3>管理者情報</h3>
          <p>番号：<span th:text="${session.admin.id}"></span></p>
          <p>名前：<span th:text="${session.admin.name}"></span></p>
          <hr>
          <h3>管理者一覧</h3>
          <table class="table table-striped">
            <thead>
              <tr>
                <th>番号</th>
                <th>名前</th>
                <th>メールアドレス</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="admin : ${session.adminList}">
                <td th:text="${admin.id}"></td>
                <td th:text="${admin.name}"></td>
                <td th:text="${admin.mailAddress}"></td>
              </tr>
            </tbody>
          </table>
          <hr>
          <h3>管理者登録</h3>
          <form th:action="@{/administrator/insert}" method="post">
            <div class="form-group">
              <label for="name">名前</label>
              <input type="text" class="form-control" id="name" name="name" placeholder="名前を入力してください" />
            </div>
            <div class="form-group">
              <label for="mail_address">メールアドレス</label>
              <input type="text" class="form-control" id="mailAddress" name="mailAddress"
                placeholder="メールアドレスを入力してください" />
            </div>
            <div class="form-group">
              <label for="password">パスワード</label>
              <input type="password" class="form-control" id="password" name="password" placeholder="パスワードを入力してください" />
            </div>
            <button type="submit" class="btn btn-primary">追加</button>
          </form>

          <!-- ここから下を編集する必要はありません -->
        </div>
      </div>
    </div>
  </div>
  <!-- end container -->
  <script src=" https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js">
  </script>
  <script src="../../static/js/bootstrap.min.js"></script>
</body>

</html>
