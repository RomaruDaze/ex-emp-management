<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>従業員管理システム</title>
  <link rel="stylesheet" href="../../static/css/bootstrap.css" th:href="@{/css/bootstrap.css}" />
  <link rel="stylesheet" href="../../static/css/style.css" th:href="@{/css/style.css}" />
  <!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>
  <div class="container">
    <nav class="navbar navbar-default">
      <div class="container-fluid">
        <!-- Brand and toggle get grouped for better mobile display -->
        <div class="navbar-header">
          <button type="button" class="navbar-toggle collapsed" data-toggle="collapse"
            data-target="#bs-example-navbar-collapse-1" aria-expanded="false">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span> <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="list.html" th:href="@{/employee/showList}">
            <!-- 企業ロゴ -->
            <img src="../../static/img/header_logo_small.png" th:src="@{/img/header_logo_small.png}" />
          </a>
        </div>

        <!-- Collect the nav links, forms, and other content for toggling -->
        <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
          <ul class="nav navbar-nav">
            <li class="active"><a href="list.html">従業員管理</a></li>
          </ul>
          <p class="navbar-text navbar-right">
            <span th:text="${session.admin.name + 'さん'}">山田さん</span>こんにちは！ 
          </p>
          <p class="navbar-text navbar-right">
            <a href="../administrator/insert" class="navbar-link">管理者登録</a>
          </p>
          <p class="navbar-text navbar-right">
            <a href=" ../administrator/login" class="navbar-link">ログアウト</a>

          </p>
        </div>
        <!-- /.navbar-collapse -->
      </div>
      <!-- /.container-fluid -->
    </nav>

    <!-- パンくずリスト -->
    <ol class="breadcrumb">
      <li>
        <a href="list.html" th:href="@{/employee/showList}">従業員リスト</a>
      </li>
      <li class="active">従業員詳細</li>
    </ol>

    <!-- register form -->
    <div class="row">
      <div class="col-lg-offset-2 col-lg-8 col-md-offset-2 col-md-8 col-sm-12 col-xs-12">
        <!-- 背景をグレーに、埋め込んだようなコンポーネント -->
        <div class="well">
          <!-- ここから上を編集する必要はありません -->

          <div class="profile-form-container">
            <form th:action="@{/employee/detail}" method="post">
              <input type="hidden" name="id" th:value="${session.employee.id}" />
              <div class="form-group">
                <label for="name">名前</label>
                <input type="text" id="name" name="name" class="form-control" th:value="${session.employee.name}" />
              </div>

              <div class="form-group">
                <label>写真</label>
                <div class="form-control-static">
                  <img th:src="@{|/img/${session.employee.image}|}" class="profile-img-preview" alt="Current Photo" />
                  <input type="text" name="image" class="form-control" th:value="${session.employee.image}" />
                  <small class="text-muted">※ファイル名を変更する場合のみ入力</small>
                </div>
              </div>
              <input type="hidden" name="id" th:value="${session.employee.id}">

              <div class="form-group">
                <label for="hireDate">入社日</label>
                <input type="text" id="hireDate" name="hireDate" class="form-control"
                  th:value="${session.employee.hireDate}" />
              </div>

              <div class="form-group">
                <label>性別</label>
                <div class="form-control-static">
                  <label class="radio-inline">
                    <input type="radio" name="gender" value="男性" th:checked="${session.employee.gender == '男性'}"> 男性
                  </label>
                  <label class="radio-inline">
                    <input type="radio" name="gender" value="女性" th:checked="${session.employee.gender == '女性'}"> 女性
                  </label>
                </div>
              </div>

              <div class="form-group">
                <label for="mailAddress">メールアドレス</label>
                <input type="email" id="mailAddress" name="mailAddress" class="form-control"
                  th:value="${session.employee.mailAddress}" />
              </div>

              <div class="form-group">
                <label for="zipCode">郵便番号</label>
                <input type="text" id="zipCode" name="zipCode" class="form-control"
                  th:value="${session.employee.zipCode}" />
              </div>

              <div class="form-group">
                <label for="address">住所</label>
                <input type="text" id="address" name="address" class="form-control"
                  th:value="${session.employee.address}" />
              </div>

              <div class="form-group">
                <label for="telephone">電話番号</label>
                <input type="tel" id="telephone" name="telephone" class="form-control"
                  th:value="${session.employee.telephone}" />
              </div>

              <div class="form-group">
                <label for="salary">給与</label>
                <div class="input-group">
                  <span class="input-group-addon">¥</span>
                  <input type="number" id="salary" name="salary" class="form-control"
                    th:value="${session.employee.salary}" />
                </div>
              </div>

              <div id="characteristics-group" class="form-group">
                <label for="characteristics">特性</label>
                <textarea id="characteristics" name="characteristics" class="form-control" rows="3"
                  th:text="${session.employee.characteristics}"></textarea>
              </div>

              <div class="form-group">
                <label for="dependentsCount">配偶人数</label>
                <input type="number" id="dependentsCount" name="dependentsCount" class="form-control"
                  th:value="${session.employee.dependentsCount}" />
              </div>

              <div class="text-center">
                <button type="submit" class="btn btn-primary btn-update">更新</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!-- end container -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script src="../../static/js/bootstrap.min.js" th:src="@{/js/bootstrap.min.js}"></script>
</body>

</html>
